name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build macOS DMGs
    runs-on: macos-14

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Test
        run: swift test

      - name: Smoke test fixtures
        run: |
          swift run data-inspect tests/fixtures/auto.dta 5
          swift run data-inspect tests/fixtures/sample.rds 5
          swift run data-inspect tests/fixtures/sample.mat 5

      - name: Build arm64 DMG
        run: BUILD_ARCHS="arm64" ARCH_LABEL="arm64" ./scripts/make-dmg.sh

      - name: Build universal DMG
        run: BUILD_ARCHS="arm64 x86_64" ARCH_LABEL="universal" ./scripts/make-dmg.sh

      - name: Verify app signatures
        run: |
          codesign --verify --deep --strict --verbose=2 .build/app/DataViewer.app
          codesign -d --entitlements :- .build/app/DataViewer.app/Contents/PlugIns/DataViewerQuickLookExtension.appex
          file .build/app/DataViewer.app/Contents/MacOS/DataViewer

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DataViewer-DMGs
          path: .build/dist/*.dmg

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: .build/dist/*.dmg
          body: |
            Unsigned, not notarized macOS build.

            Install:
            1. Open the DMG and drag DataViewer.app to Applications.
            2. Remove quarantine:

               ```sh
               xattr -rd com.apple.quarantine /Applications/DataViewer.app
               ```

            Artifacts:
            - `arm64`: Apple Silicon only.
            - `universal`: Apple Silicon and Intel.
